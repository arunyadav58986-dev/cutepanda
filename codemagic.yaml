workflows:
  android-release:
    name: Cutepanda Android Build
    instance_type: mac_mini_m2

    environment:
      node: 22
      java: 21
      android_signing:
        - keystore_reference

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Build web assets
        script: npm run build || echo "skip build"

      - name: Sync Capacitor
        script: npx cap sync android

      - name: Build APK
        script: |
          cd android
          ./gradlew assembleRelease

    artifacts:
      - android/app/build/outputs/apk/release/*.apk
