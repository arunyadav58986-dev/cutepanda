workflows:
  android-release:
    name: Cutepanda Android Build
    max_build_duration: 60
    instance_type: linux_x2

    environment:
      node: 18
      java: 17
      android_signing:
        - keystore_reference

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Build web assets
        script: npm run build || echo "skip build"

      - name: Sync Capacitor
        script: npx cap sync android

      - name: Build APK
        script: |
          cd android
          ./gradlew assembleRelease

    artifacts:
      - android/app/build/outputs/**/*.apk
